name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            openjdk-17-jdk

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Accept Android licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\ne6b7c2ab7fa2298c15165e9583d0cbd0846f5099" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK
        working-directory: android
        run: |
          buildozer android debug
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lazyboy-apk
          path: android/bin/*.apk
