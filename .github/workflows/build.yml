name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SDK tools and licenses
        run: |
          apt-get update -qq && apt-get install -y -qq curl unzip > /dev/null 2>&1
          SDK_ROOT=/github/home/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_ROOT/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_ROOT/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $SDK_ROOT/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $SDK_ROOT/licenses/android-sdk-license
          echo -e "\ne6b7c2ab7fa2298c15165e9583d0cbd0846f5099" >> $SDK_ROOT/licenses/android-sdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" >> $SDK_ROOT/licenses/android-sdk-license
          mkdir -p $SDK_ROOT/cmdline-tools
          cd /tmp
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdtools.zip
          unzip -q cmdtools.zip -d $SDK_ROOT/cmdline-tools
          mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest
          mkdir -p $SDK_ROOT/tools/bin
          for f in $SDK_ROOT/cmdline-tools/latest/bin/*; do
            ln -sf "$f" "$SDK_ROOT/tools/bin/$(basename $f)"
          done
          chmod +x $SDK_ROOT/tools/bin/*

      - name: Build APK
        working-directory: android
        run: |
          buildozer android debug
        timeout-minutes: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lazyboy-apk
          path: android/bin/*.apk
